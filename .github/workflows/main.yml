name: CI

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  # Fast lane: fixture-based unit tests + RuboCop + Steep. No network,
  # no Rust — the gem's pure-Ruby surface across supported Rubies.
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake

  # Rust style lane: fmt + the host placeholder branch — the code a
  # registry consumer's `cargo check` compiles without a staged
  # libmruby.a. Only the host target has that mode (an explicit wasm32
  # build without the toolchain panics by design), so the linked
  # branches on both targets are linted in the verify lane instead.
  lint:
    runs-on: ubuntu-latest
    name: Rust lint

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # dtolnay/rust-toolchain does not read rust-toolchain.toml, so source
      # the channel from it here to keep a single version of truth.
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy (host placeholder)
        run: cargo clippy --workspace -- -D warnings
      # Placeholder-mode unit tests: the full-API-surface compile
      # check and the `Mrb::open` → Err contract (success criterion 3)
      # only execute without a staged archive, which is this lane.
      - name: cargo test (host placeholder)
        run: cargo test --workspace
      # Same doc gate as the local Stop hook — rustdoc warnings
      # (broken intra-doc links, bad code fences) fail the lane.
      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # Integration lane: the repo's full dogfooding chain on every
  # WASI_SDK_PLATFORM detection branch. rust:verify drives a real
  # vendor download (mruby + wasi-sdk), the custom-config host + wasi
  # cross build, cargo test against the native archive, a wasm32
  # check, and the default-ABI leg. Vendor tarballs are deliberately
  # not cached — the download path is part of what's under test.
  verify:
    runs-on: ${{ matrix.os }}
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: clippy
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Full compile verification
        run: bundle exec rake rust:verify
      # clippy over the linked code paths the lint lane's placeholder
      # mode never compiles — possible only here, where rust:verify
      # has staged the vendor toolchain. Discovery is env-driven with
      # no fallback, so the vendor artifacts are named explicitly.
      # One OS suffices: the lints are target-shaped, not host-shaped.
      - name: cargo clippy (linked, host + wasm32-wasip1)
        if: matrix.os == 'ubuntu-latest'
        run: |
          BENI_VENDOR_DIR="$PWD/vendor" \
            cargo clippy --workspace -- -D warnings
          MRUBY_LIB_DIR="$PWD/vendor/mruby/build/wasi/lib" WASI_SDK_PATH="$PWD/vendor/wasi-sdk" \
            cargo clippy --workspace --target wasm32-wasip1 -- -D warnings

  # Consumer lane: each harness under test/scenarios/ is a
  # consumer-shaped Rakefile run from its own directory through the
  # gem's task interface alone (scenario:setup → beni:build →
  # scenario:verify), plain rake without Bundler. default_host is the
  # zero-configuration path: mruby alone, upstream default config,
  # host target — platform-sensitive (mruby's native toolchain
  # detection), so it runs on every OS. generated_config drives the
  # rake beni:config → cross-build chain; the mechanism is
  # platform-independent and the resulting config already builds on
  # all three OS in the verify lane, so one OS suffices.
  scenario:
    runs-on: ${{ matrix.os }}
    name: Scenario ${{ matrix.scenario }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            scenario: default_host
          - os: ubuntu-24.04-arm
            scenario: default_host
          - os: macos-latest
            scenario: default_host
          - os: ubuntu-latest
            scenario: generated_config

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.4'
      - name: Build through the gem's task interface
        run: rake scenario:setup beni:build scenario:verify
        working-directory: test/scenarios/${{ matrix.scenario }}
