# Publishes `beni-sys` and `beni` to crates.io via OIDC Trusted
# Publishing. `cargo publish --workspace` (stable since 1.90) orders the
# uploads by dependency (beni-sys first) and waits for index propagation
# between them; the verify builds run in placeholder mode, so no mruby
# archive is needed. The manual-recovery shape mirrors the gem's —
# `workflow_dispatch` defaults `push` to false, so a bare dispatch is a
# `cargo publish --dry-run` rehearsal; tick `push` to publish for real.
name: Release Crate

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Publish the crates to crates.io'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      push:
        description: 'Publish the crates to crates.io'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-crates:
    name: Publish beni-sys and beni to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # dtolnay/rust-toolchain does not read rust-toolchain.toml, so source
      # the channel from it here to keep a single version of truth.
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
      - name: Dry-run publish
        if: ${{ !inputs.push }}
        run: cargo publish --workspace --dry-run
      # Trusted Publishing: exchange the workflow's OIDC token for a
      # short-lived crates.io token. beni-sys and beni each name two
      # publishers on crates.io: release-please.yml for the chained
      # release and this file for manual dispatch.
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        if: ${{ inputs.push }}
        id: auth
      - name: Publish to crates.io
        if: ${{ inputs.push }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --workspace
