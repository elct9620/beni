# Append to the default Exclude list (vendor/, tmp/, …) instead of
# replacing it — the repo-root vendor tree must stay excluded.
inherit_mode:
  merge:
    - Exclude

AllCops:
  # Kept at the gemspec's required_ruby_version floor (>= 3.3) — a gem
  # must not use syntax newer than the oldest Ruby it supports.
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  # The consumer-scenario harnesses vendor a full mruby tree and
  # generate their build configs (scenario:setup output, upstream
  # content); only the harness Rakefiles themselves are ours to lint.
  Exclude:
    - "test/scenarios/*/vendor/**/*"
    - "test/scenarios/*/build_config/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Exclude:
    - "*.gemspec"

# `namespace :rust` in tasks/rust.rake declares the verification legs
# (host check / test, wasm check, default-ABI test, verify) as one
# desc/task pair each, with the bodies delegating to
# tasks/support/beni_rust.rb; the block exceeds the default 25-line
# budget through task count alone. Other .rake files are expected to
# fit the default. Same shape as kobako's tasks/vendor.rake exemption.
Metrics/BlockLength:
  Exclude:
    - "tasks/rust.rake"
    - "*.gemspec"

# ruby/rbs upstream documents `class X < Data.define(...)` as the
# Steep-friendly form for typed Value Objects — the assignment form
# (`X = Data.define(...)`) leaves Data's auto-generated methods inside
# a `do ... end` block that Steep cannot see, forcing every type
# carrying validation logic to wrap its body in `# steep:ignore`.
# We pick Steep over Rubocop here; the only visible cost is one
# anonymous superclass entry in `.ancestors`. Same choice as kobako.
# https://github.com/ruby/rbs/blob/master/docs/data_and_struct.md
Style/DataInheritance:
  Enabled: false
