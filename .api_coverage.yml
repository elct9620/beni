  mrb_yield_argv: Proc::call

extensions:
  Error: >-
    Result-based error model: a handler's `Err(Error)` is raised into the
    VM by the dispatch bridge (`mrb_exc_raise`), and a VM raise is caught
    back into `Err` by `Mrb::protect` (`mrb_protect_error`). `Error::new`
    builds an exception error from a class and a message (via
    `RClass::exc_new`) for a handler to raise its own exception, and
    `Error::argnum` builds the canonical wrong-argument-count
    `ArgumentError` (via `mrb_argnum_error`) for a handler validating its
    own arity.
  ArenaScope: >-
    RAII GC-arena bracket over `mrb_gc_arena_save`/`mrb_gc_arena_restore`
    with a `mrb_gc_protect` keep — a safety guard with no single C API.
  Immediates: >-
    Cached qnil/qtrue/qfalse singletons over `mrb_nil_value` /
    `mrb_true_value` / `mrb_false_value`.
  DataType: >-
    Typed CDATA carrier over `mrb_data_type` + `mrb_data_object_alloc`,
    adding Rust-side type safety to the data pointer.
  convert: >-
    `IntoValue` / `FromValue` trait conversions (magnus-style) layered on
    the value box/unbox primitives, including `FromValue for String` and
    `Vec<u8>` (an mruby string copied out as an owned UTF-8 `String` or as
    arbitrary owned bytes).
