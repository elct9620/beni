# Typed-surface coverage manifest
# ================================
#
# Hand-authored record of how the typed `beni` wrapper covers mruby's C
# API. The C symbol *inventory* (the denominator) is scanned from the
# vendored headers by `rake api:coverage`; this file is the *numerator*
# the implementer maintains.
#
# Two sections:
#
#   typed       — keyed by mruby C API symbol (function or function-like
#                 macro, exactly as in the headers). The value is a free
#                 -form Note naming the Rust item(s) that graduate it —
#                 the safe surface a `typed ✅` row points at, so the
#                 checkmark has a verifiable Rust side. List several,
#                 comma-separated, when more than one binds it; add
#                 prose for caveats. A single bare symbol is rendered as
#                 code automatically. A `~` Note is reported as
#                 "unspecified": typed, but its Rust side is unnamed.
#   extensions  — Rust-native surface with no 1:1 C API (RAII guards,
#                 caches, trait conversions). Documented for context;
#                 not part of the C-API coverage ratio.
#
# The raw `sys` FFI tier is derived automatically (bindgen + wrapper.h
# shims), so it is not listed. A `typed` key absent from the scanned
# inventory is reported as "unknown" by the rake task.
---
typed:
  MRB_ARGS_ANY: a typed method's `-1` arity, derived by `Module::define_method`
  MRB_ARGS_NONE: a typed method's `0` arity, derived by `Module::define_method` (the no-argument aspec a zero-arity definition declares)
  MRB_ARGS_REQ: a typed method's positional arity, derived by `Module::define_method`
  MRB_SET_INSTANCE_TT: RClass::set_instance_data_tt
  RARRAY_LEN: Array::len
  RSTRING_LEN: "`RString::as_bytes`, `RString::to_bytes`, `RString::len`"
  RSTRING_PTR: "`RString::as_bytes`, `RString::to_bytes`"
  mrb_argnum_error: Error::argnum
  mrb_ary_clear: Array::clear
  mrb_ary_concat: Array::concat
  mrb_ary_dup: Array::dup
  mrb_ary_entry: "`Array::entry`, `Value::ary_entry`"
  mrb_ary_new: Mrb::ary_new
  mrb_ary_new_capa: Mrb::ary_new_capa
  mrb_ary_new_from_values: Mrb::ary_new_from_values
  mrb_ary_pop: Array::pop
  mrb_ary_push: Array::push
  mrb_ary_resize: Array::resize
  mrb_ary_set: Array::store
  mrb_ary_shift: Array::shift
  mrb_ary_unshift: Array::unshift
  mrb_array_p: "`Value::is_array`, via the value tag"
  mrb_assoc_new: Mrb::assoc_new
  mrb_as_float: "`Value::as_float` — convert across the numeric types, distinct from the exact-tag `f64::from_value` downcast"
  mrb_as_int: "`Value::as_int` — convert across the numeric types, distinct from the exact-tag `i32::from_value` downcast"
  mrb_break_p: Value::as_break
  mrb_class_p: "`Value::is_class`, via the value tag"
  mrb_data_p: "`Value::is_data`, via the value tag"
  mrb_exception_p: "`Value::is_exception`, via the value tag"
  mrb_float_p: "`Value::is_float`, via the value tag"
  mrb_hash_p: "`Value::is_hash`, via the value tag"
  mrb_integer_p: "`Value::is_integer` — true for any Integer; the immediate-only `mrb_fixnum_p`, which diverges from this under word boxing, is intentionally not graduated"
  mrb_module_p: "`Value::is_module`, via the value tag"
  mrb_proc_p: "`Value::is_proc`, via the value tag"
  mrb_range_p: "`Value::is_range`, via the value tag"
  mrb_string_p: "`Value::is_string`, via the value tag"
  mrb_symbol_p: "`Value::is_symbol`, via the value tag"
  mrb_break_value_get: Break::value
  mrb_ccontext_filename: Ccontext::new
  mrb_ccontext_free: Ccontext::drop
  mrb_ccontext_new: Ccontext::new
  mrb_check_error: Mrb::clear_exc
  mrb_check_frozen_value: "`Value::check_frozen` — the frozen-state precondition guard; `mrb_check_frozen` (the `void*` form) and `mrb_check_type` (a raw `mrb_vtype` tag, subsumed by the `FromValue` downcasts) stay in `sys`"
  mrb_class_get: "`Mrb::class_get` with a name key — interns and routes through `mrb_class_get_id`"
  mrb_class_get_id: "`Mrb::class_get` with a `Symbol` key (the symbol-or-name key, magnus `IntoId`)"
  mrb_class_get_under: "`Module::class_get` with a name key — interns and routes through `mrb_class_get_under_id`"
  mrb_class_get_under_id: "`Module::class_get` with a `Symbol` key (the symbol-or-name key)"
  mrb_class_real: "`RClass::real` — resolve a class handle to its real class, skipping singleton / include classes; `mrb_class` (the raw class of a value, which may be a singleton or include class and needs VM-internal reasoning) stays in `sys`, and `Value::class` via `mrb_obj_class` already returns the real class of a value"
  mrb_class_name: Module::name
  mrb_class_ptr: Value::as_class_ptr
  mrb_close: Mrb::drop
  mrb_const_defined: Value::const_defined
  mrb_const_get: Value::const_get
  mrb_cv_get: "`Value::cv_get` — the value-level class-variable read; `mrb_mod_cv_set` / `mrb_cv_set` (the writes) stay in `sys`"
  mrb_data_check_get_ptr: Value::data_get
  mrb_data_init: Value::data_reinit
  mrb_data_object_alloc: "`RClass::data_wrap` (see DataType extension)"
  mrb_define_alias: Module::alias_method
  mrb_define_class: "`Mrb::define_class` with a name key — interns and routes through `mrb_define_class_id`"
  mrb_define_class_id: "`Mrb::define_class` with a `Symbol` key (the symbol-or-name key, magnus `IntoId`)"
  mrb_define_class_method: "`Object::define_singleton_method` on a class — a class's singleton method is its class method (magnus alignment)"
  mrb_define_class_method_id: "`Object::define_singleton_method` with a `Symbol` key on a class — a class's singleton method is its class method (magnus alignment)"
  mrb_define_class_under: "`Module::define_class` with a name key — interns and routes through `mrb_define_class_under_id`"
  mrb_define_class_under_id: "`Module::define_class` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_const: "`Module::define_const` with a name key — interns and routes through `mrb_define_const_id`"
  mrb_define_const_id: "`Module::define_const` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_global_const: Mrb::define_global_const
  mrb_define_method: "`Module::define_method` with a name key — interns and routes through `mrb_define_method_id`"
  mrb_define_method_id: "`Module::define_method` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_module: "`Mrb::define_module` with a name key — interns and routes through `mrb_define_module_id`"
  mrb_define_module_id: "`Mrb::define_module` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_module_function: "`Module::define_module_function` with a name key — interns and routes through `mrb_define_module_function_id`"
  mrb_define_module_function_id: "`Module::define_module_function` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_module_under: "`Module::define_module` with a name key — interns and routes through `mrb_define_module_under_id`"
  mrb_define_module_under_id: "`Module::define_module` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_private_method: "`Module::define_private_method` with a name key — interns and routes through `mrb_define_private_method_id`"
  mrb_define_private_method_id: "`Module::define_private_method` with a `Symbol` key (the symbol-or-name key)"
  mrb_define_singleton_method: "`Object::define_singleton_method` with a name key — interns and routes through `mrb_define_singleton_method_id`"
  mrb_define_singleton_method_id: "`Object::define_singleton_method` with a `Symbol` key (the symbol-or-name key)"
  mrb_ensure_string_type: "`Value::ensure_string` — the raising String-tag coercion to an `RString` handle; `mrb_check_string_type` (the `nil`-returning form) is subsumed by the `FromValue` -> `RString` downcast and stays in `sys`"
  mrb_eql: Value::eql
  mrb_equal: Value::equal
  mrb_obj_equal: Value::obj_equal
