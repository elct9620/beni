  mrb_check_error: Mrb::clear_exc
  mrb_check_frozen_value: "`Value::check_frozen` — the frozen-state precondition guard; `mrb_check_frozen` (the `void*` form) and `mrb_check_type` (a raw `mrb_vtype` tag, subsumed by the `FromValue` downcasts) stay in `sys`"
  mrb_class_defined: "`Mrb::class_defined` with a name key — interns and routes through `mrb_class_defined_id`"
  mrb_class_defined_id: "`Mrb::class_defined` with a `Symbol` key (the symbol-or-name key) — a total bool predicate, never raises"
  mrb_class_defined_under: "`Module::class_defined` with a name key — interns and routes through `mrb_class_defined_under_id`"
  mrb_class_defined_under_id: "`Module::class_defined` with a `Symbol` key (the symbol-or-name key) — a total bool predicate, never raises"
  mrb_class_get: "`Mrb::class_get` with a name key — interns and routes through `mrb_class_get_id`"
  mrb_class_get_id: "`Mrb::class_get` with a `Symbol` key (the symbol-or-name key, magnus `IntoId`)"
  mrb_class_get_under: "`Module::class_get` with a name key — interns and routes through `mrb_class_get_under_id`"
  mrb_class_get_under_id: "`Module::class_get` with a `Symbol` key (the symbol-or-name key)"
  mrb_class_real: "`RClass::real` — resolve a class handle to its real class, skipping singleton / include classes; `mrb_class` (the raw class of a value, which may be a singleton or include class and needs VM-internal reasoning) stays in `sys`, and `Value::class` via `mrb_obj_class` already returns the real class of a value"
  mrb_class_name: Module::name
  mrb_class_new: "`Mrb::class_new` — create an anonymous class under a given superclass, bound to no constant"
  mrb_class_path: "`Module::path` — the handle's fully-qualified namespace path (`Outer::Inner`), `None` for an anonymous handle; contrast `mrb_class_name`/`Module::name`, which always answers a name and synthesizes a stand-in when anonymous"
  mrb_class_ptr: Value::as_class_ptr
  mrb_close: Mrb::drop
  mrb_const_defined: "`Value::const_defined` — the constant presence test walking the ancestry; contrast `mrb_const_defined_at`/`Value::const_defined_at`, the direct own-table-only form"
  mrb_const_defined_at: "`Value::const_defined_at` — the direct constant presence test, true only for the receiver's own constant; contrast `mrb_const_defined`/`Value::const_defined`, which walks the ancestry"
  mrb_const_get: Value::const_get
  mrb_const_remove: "`Value::const_remove` — the value-level constant removal; discards the former value (the C API is `void`) and treats an absent constant as a no-op"
  mrb_const_set: Value::const_set
  mrb_cv_defined: "`Value::cv_defined` — the value-level class-variable presence test, walking the ancestry; `mrb_mod_cv_defined` (the raw-`RClass*` form) stays in `sys`"
  mrb_cv_get: Value::cv_get
  mrb_cv_set: "`Value::cv_set` — the value-level class-variable write; `mrb_mod_cv_set` (the raw-`RClass*` form) stays in `sys`"
  mrb_data_check_get_ptr: Value::data_get
