  mrb_hash_values: Hash::values
  mrb_include_module: Module::include_module
  mrb_inspect: Value::inspect
  mrb_int_value: Value::from_int
  mrb_intern_cstr: Mrb::intern_cstr
  mrb_intern_str: Mrb::intern_str
  mrb_iv_defined: "`Value::iv_defined` — the value-level instance-variable presence test; the raw-`RObject*` `mrb_obj_iv_defined` and `mrb_obj_iv_set` stay in `sys`"
  mrb_iv_get: Value::iv_get
  mrb_iv_set: Value::iv_set
